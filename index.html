<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Blue Web App</title>
    <style>
        /* CSS - The Design */
        body {
            background-color: #1e3a8a; /* A deep, modern blue */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
        }

        .container {
            background: rgba(120, 125, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.18);
        }

        h1 {
            margin-bottom: 1.5rem;
        }

        .counter-display {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 1rem;
        }

        button {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        button:hover {
            background-color: #60a5fa;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome To Commercial 2026!</h1>
        <p>Current Count:</p>
        <div class="counter-display" id="counter">0</div>
        <button onclick="increment()">Click to Count</button>
    </div>

    <script>
        let count = 0;
        const counterElement = document.getElementById('counter');

        function increment() {
            count++;
            counterElement.innerText = count;
      ////  }
    </script>

</body>
</html>
